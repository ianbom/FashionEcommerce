services:
  app:
    build:
      args:
        APP_ENV: local
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      RUN_FRESH_SEED: "true"
    volumes:
      - storage:/var/www/html/storage

  web:
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  queue:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      RUN_FRESH_SEED: "true"
    volumes:
      - storage:/var/www/html/storage

  scheduler:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      RUN_FRESH_SEED: "true"
    volumes:
      - storage:/var/www/html/storage

  vite:
    profiles:
      - never
